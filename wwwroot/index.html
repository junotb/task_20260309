<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Directory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/30 z-40 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-2xl px-8 py-6 flex items-center gap-4">
      <div class="animate-spin rounded-full h-8 w-8 border-2 border-indigo-600 border-t-transparent"></div>
      <span class="text-slate-700 font-medium">처리 중...</span>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
    <!-- Header -->
    <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-10">
      <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 tracking-tight">
        Employee Directory
      </h1>
      <button
        id="btn-register"
        class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-sm transition-colors"
      >
        <i data-lucide="user-plus" class="w-4 h-4"></i>
        등록
      </button>
    </header>

    <!-- Employee List -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <ul id="employee-list" class="divide-y divide-slate-100">
        <!-- Dynamically populated -->
      </ul>
      <div id="empty-state" class="hidden py-16 text-center text-slate-500">
        <i data-lucide="users" class="w-12 h-12 mx-auto mb-3 opacity-40"></i>
        <p>등록된 직원이 없습니다.</p>
      </div>
      <div id="loading-state" class="py-12 text-center">
        <div class="animate-spin rounded-full h-8 w-8 border-2 border-indigo-600 border-t-transparent mx-auto"></div>
        <p class="mt-2 text-slate-500 text-sm">로딩 중...</p>
      </div>
      <!-- Pagination -->
      <div id="pagination" class="hidden flex items-center justify-between gap-4 px-4 sm:px-6 py-4 border-t border-slate-100 bg-slate-50/50">
        <div class="flex items-center gap-3">
          <span class="text-sm text-slate-600" id="pagination-info">0–0 / 0건</span>
          <select id="page-size" class="text-sm border border-slate-200 rounded-lg px-2 py-1.5 bg-white">
            <option value="10">10개씩</option>
            <option value="20">20개씩</option>
            <option value="50">50개씩</option>
          </select>
        </div>
        <div class="flex items-center gap-1">
          <button id="btn-prev" type="button" class="p-2 rounded-lg hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed text-slate-600" title="이전">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
          </button>
          <span id="page-numbers" class="text-sm text-slate-600 px-2"></span>
          <button id="btn-next" type="button" class="p-2 rounded-lg hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed text-slate-600" title="다음">
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </section>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-modal="true">
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="fixed inset-0 bg-slate-900/50 transition-opacity" data-modal-backdrop></div>
      <div class="relative bg-white rounded-2xl shadow-xl max-w-md w-full p-6 transform transition-all">
        <button data-modal-close class="absolute top-4 right-4 p-1 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
        <div id="detail-content" class="pt-2"></div>
      </div>
    </div>
  </div>

  <!-- Registration Modal -->
  <div id="register-modal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-modal="true">
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="fixed inset-0 bg-slate-900/50 transition-opacity" data-modal-backdrop></div>
      <div class="relative bg-white rounded-2xl shadow-xl max-w-lg w-full p-6 transform transition-all">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-semibold text-slate-800">직원 등록</h2>
          <button data-modal-close class="p-1 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <form id="register-form" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">CSV/JSON 파일 업로드</label>
            <input
              type="file"
              id="file-input"
              name="file"
              accept=".csv,.json"
              class="block w-full text-sm text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 file:font-medium"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">또는 직접 입력 (CSV/JSON)</label>
            <p class="text-xs text-slate-500 mb-1.5">둘 다 입력 시 병합 후 이메일 기준 중복 제거됩니다.</p>
            <textarea
              id="raw-data"
              name="rawData"
              rows="5"
              placeholder="Name,Email,Tel,Joined&#10;홍길동,hong@example.com,010-1234-5678,2024-01-15"
              class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
            ></textarea>
          </div>
          <button
            type="submit"
            class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition-colors flex items-center justify-center gap-2"
          >
            <i data-lucide="send" class="w-4 h-4"></i>
            등록하기
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    const API_BASE = '/api/employee';

    // Pagination state
    let currentPage = 1;
    let pageSize = 10;
    let totalCount = 0;

    // Toast notification
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `px-5 py-3 rounded-lg shadow-lg flex items-center gap-2 animate-[slideDown_0.3s_ease-out] ${
        type === 'success' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'
      }`;
      el.innerHTML = `
        <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5 flex-shrink-0"></i>
        <span>${message}</span>
      `;
      container.appendChild(el);
      lucide.createIcons();
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(-8px)';
        el.style.transition = 'opacity 0.2s, transform 0.2s';
        setTimeout(() => el.remove(), 200);
      }, 3000);
    }

    // Loading overlay
    function setLoading(show) {
      document.getElementById('loading-overlay').classList.toggle('hidden', !show);
    }

    // Fetch employee list
    async function fetchEmployees(page = currentPage) {
      currentPage = Math.max(1, page);
      const listEl = document.getElementById('employee-list');
      const emptyEl = document.getElementById('empty-state');
      const loadingEl = document.getElementById('loading-state');
      const paginationEl = document.getElementById('pagination');

      loadingEl.classList.remove('hidden');
      listEl.innerHTML = '';
      emptyEl.classList.add('hidden');
      paginationEl.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}?Page=${currentPage}&PageSize=${pageSize}`);
        if (!res.ok) throw new Error('조회 실패');
        const data = await res.json();

        loadingEl.classList.add('hidden');
        totalCount = data.totalCount ?? 0;

        if (!data.items?.length) {
          emptyEl.classList.remove('hidden');
          return;
        }

        data.items.forEach((emp) => {
          const li = document.createElement('li');
          li.className = 'flex items-center gap-4 px-4 sm:px-6 py-4 hover:bg-slate-50 cursor-pointer transition-colors';
          li.dataset.id = emp.id;
          li.dataset.name = emp.name;
          li.dataset.email = emp.email;
          li.dataset.tel = emp.tel;
          li.dataset.joined = emp.joined;

          const initials = emp.name
            ? emp.name.split(/\s+/).map((s) => s[0]).join('').slice(0, 2).toUpperCase()
            : '?';

          li.innerHTML = `
            <div class="flex-shrink-0 w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-semibold text-sm">
              ${initials}
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-medium text-slate-800 truncate">${emp.name || '-'}</p>
              <p class="text-sm text-slate-500 truncate">${emp.email || '-'}</p>
            </div>
            <div class="flex-shrink-0 text-sm text-slate-600">
              ${emp.tel || '-'}
            </div>
          `;

          li.addEventListener('click', () => openDetailModal(emp));
          listEl.appendChild(li);
        });

        updatePagination(totalCount, data.items.length);
      } catch (err) {
        loadingEl.classList.add('hidden');
        emptyEl.classList.remove('hidden');
        showToast(err.message || '직원 목록을 불러오지 못했습니다.', 'error');
      }
    }

    function updatePagination(total, itemsOnPage) {
      const paginationEl = document.getElementById('pagination');
      const infoEl = document.getElementById('pagination-info');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      const pageNumbersEl = document.getElementById('page-numbers');

      if (total === 0) return;

      paginationEl.classList.remove('hidden');
      const start = (currentPage - 1) * pageSize + 1;
      const end = start + itemsOnPage - 1;
      infoEl.textContent = `${start}–${end} / ${total}건`;

      const totalPages = Math.ceil(total / pageSize) || 1;
      btnPrev.disabled = currentPage <= 1;
      btnNext.disabled = currentPage >= totalPages;

      pageNumbersEl.textContent = `${currentPage} / ${totalPages}`;
      lucide.createIcons();
    }

    // Detail Modal
    function openDetailModal(emp) {
      const joined = emp.joined ? new Date(emp.joined).toLocaleDateString('ko-KR') : '-';
      document.getElementById('detail-content').innerHTML = `
        <div class="flex items-center gap-4 mb-6">
          <div class="w-16 h-16 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-xl">
            ${emp.name ? emp.name.split(/\s+/).map((s) => s[0]).join('').slice(0, 2).toUpperCase() : '?'}
          </div>
          <div>
            <h3 class="text-xl font-semibold text-slate-800">${emp.name || '-'}</h3>
            <p class="text-slate-500">${emp.email || '-'}</p>
          </div>
        </div>
        <dl class="space-y-3">
          <div>
            <dt class="text-xs font-medium text-slate-400 uppercase tracking-wider">이메일</dt>
            <dd class="text-slate-700">${emp.email || '-'}</dd>
          </div>
          <div>
            <dt class="text-xs font-medium text-slate-400 uppercase tracking-wider">전화번호</dt>
            <dd class="text-slate-700">${emp.tel || '-'}</dd>
          </div>
          <div>
            <dt class="text-xs font-medium text-slate-400 uppercase tracking-wider">등록일</dt>
            <dd class="text-slate-700">${joined}</dd>
          </div>
        </dl>
      `;
      document.getElementById('detail-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    // Modal close handlers
    function setupModal(id) {
      const modal = document.getElementById(id);
      const backdrop = modal.querySelector('[data-modal-backdrop]');
      const closeBtns = modal.querySelectorAll('[data-modal-close]');

      function close() {
        modal.classList.add('hidden');
      }

      backdrop?.addEventListener('click', close);
      closeBtns.forEach((btn) => btn.addEventListener('click', close));
    }

    setupModal('detail-modal');
    setupModal('register-modal');

    // Pagination
    document.getElementById('btn-prev').addEventListener('click', () => fetchEmployees(currentPage - 1));
    document.getElementById('btn-next').addEventListener('click', () => fetchEmployees(currentPage + 1));
    document.getElementById('page-size').addEventListener('change', (e) => {
      pageSize = parseInt(e.target.value, 10);
      fetchEmployees(1);
    });

    // Registration
    document.getElementById('btn-register').addEventListener('click', () => {
      document.getElementById('register-modal').classList.remove('hidden');
      document.getElementById('register-form').reset();
      lucide.createIcons();
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const fileInput = document.getElementById('file-input');
      const rawDataEl = document.getElementById('raw-data');
      const rawData = rawDataEl.value.trim();
      const hasFile = fileInput.files?.[0] && fileInput.files[0].size > 0;

      if (!hasFile && !rawData) {
        showToast('파일을 선택하거나 rawData에 CSV/JSON을 입력해 주세요.', 'error');
        return;
      }

      setLoading(true);

      try {
        const formData = new FormData(form);
        const res = await fetch(API_BASE, {
          method: 'POST',
          body: formData,
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          let msg = data?.message || data?.error;
          if (!msg && Array.isArray(data?.errors) && data.errors.length > 0) {
            msg = data.errors.map(e => `${e.index}행(${e.email}): ${(e.errors || []).join(', ')}`).join('; ');
          }
          throw new Error(msg || '등록에 실패했습니다.');
        }

        document.getElementById('register-modal').classList.add('hidden');
        const imported = data?.imported ?? 0;
        const skipped = data?.skipped ?? 0;
        const hasErrors = Array.isArray(data?.errors) && data.errors.length > 0;
        let toastMsg = data?.message || `직원 ${imported}명이 등록되었습니다.`;
        if (skipped > 0 || hasErrors) {
          toastMsg += ` (${skipped}명 제외)`;
        }
        showToast(toastMsg);
        await fetchEmployees();
      } catch (err) {
        showToast(err.message || '등록에 실패했습니다.', 'error');
      } finally {
        setLoading(false);
      }
    });

    // Init
    fetchEmployees();
  </script>

  <style>
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</body>
</html>
